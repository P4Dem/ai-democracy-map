name: Deploy to GitHub Pages

on:
  push:
    branches: [dev, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Auto-detected from repo name — works in any repo without manual config.
  # Extracts "repo-name" from "owner/repo-name" and sets /repo-name as base path.
  PUBLIC_BASE_PATH: /${{ github.event.repository.name }}
  PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aixd-threatmap-master 2
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build
        env:
          PUBLIC_DATA_URL: ${{ env.PUBLIC_BASE_PATH }}/data/data.json
          PUBLIC_ASPECTS_URL: ${{ env.PUBLIC_BASE_PATH }}/data/aspects.json

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: aixd-threatmap-master 2/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
